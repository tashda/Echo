name: Build and Release

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build App
      run: |
        xcodebuild -project Echo.xcodeproj \
          -scheme Echo \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGNING_ALLOWED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=NO

    - name: Package App
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        
        echo "Cleaning and Unsigning bundle..."
        chmod -R u+w release/Echo.app
        # Remove all signature metadata recursively
        find release/Echo.app -name "_CodeSignature" -exec rm -rf {} +
        find release/Echo.app -name "CodeResources" -exec rm -rf {} +
        xattr -rc release/Echo.app
        # Explicitly remove signature from all binaries
        find release/Echo.app -type f -perm +111 -exec codesign --remove-signature {} + || true
        codesign --remove-signature release/Echo.app || true
        
        echo "Verifying unsigned state:"
        codesign -vvvv release/Echo.app || echo "Successfully stripped signature"
        
        cd release
        ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip
        rm -rf Echo.app

    - name: Get Version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      id: get_version
      run: |
        APP_PATH="build/Build/Products/Release/Echo.app"
        VERSION=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleShortVersionString)
        BUILD=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleVersion)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-$BUILD" >> $GITHUB_OUTPUT

    - name: Setup Sparkle CLI
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        cp bin/generate_appcast .

    - name: Generate Appcast
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        # Clear Sparkle's internal cache to ensure a fresh unarchive
        rm -rf ~/Library/Caches/Sparkle_generate_appcast
        
        if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
          ./generate_appcast --disable-nested-code-check release/
        else
          echo "$SPARKLE_PRIVATE_KEY" | ./generate_appcast --disable-nested-code-check --ed-key-file - release/
        fi
        mv release/appcast.xml .
        mv release/Echo.zip .

    - name: Create Release
      if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        files: |
          Echo.zip
          appcast.xml
        generate_release_notes: true
