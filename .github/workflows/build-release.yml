name: Build and Release

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build App
      run: |
        # Build with all code signing disabled
        xcodebuild -project Echo.xcodeproj \
          -scheme Echo \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGNING_ALLOWED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=NO

    - name: Package App
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        
        # Thoroughly clean and unsign the app to satisfy Sparkle's strict checks
        echo "Cleaning bundle attributes and signatures..."
        chmod -R u+w release/Echo.app
        xattr -rc release/Echo.app
        find release/Echo.app -name "_CodeSignature" -exec rm -rf {} +
        
        # Verify state
        echo "Checking code signing state (expecting unsigned):"
        codesign -vvvv release/Echo.app || echo "Bundle is unsigned (as expected)"
        
        # Package using ditto (macOS native way to preserve metadata)
        cd release
        ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip
        
        # Remove the .app folder so generate_appcast only sees the .zip
        rm -rf Echo.app

    - name: Get Version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      id: get_version
      run: |
        APP_PATH="build/Build/Products/Release/Echo.app"
        VERSION=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleShortVersionString)
        BUILD=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleVersion)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-$BUILD" >> $GITHUB_OUTPUT

    - name: Setup Sparkle CLI
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        cp bin/generate_appcast .

    - name: Generate Appcast
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        # Use --disable-nested-code-check to be safe, though removal of _CodeSignature is the key fix
        if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
          echo "Warning: SPARKLE_PRIVATE_KEY not set. Appcast will be generated without signature."
          ./generate_appcast --disable-nested-code-check release/
        else
          echo "$SPARKLE_PRIVATE_KEY" | ./generate_appcast --disable-nested-code-check --ed-key-file - release/
        fi
        mv release/appcast.xml .
        mv release/Echo.zip .

    - name: Create Release
      if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        files: |
          Echo.zip
          appcast.xml
        generate_release_notes: true
