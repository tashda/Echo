name: Build and Release

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj

    - name: Run Unit Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults \
          -skip-testing:EchoTests/MSSQLIntegrationTests \
          -skip-testing:EchoTests/PostgresIntegrationTests \
          -skip-testing:EchoTests/MySQLIntegrationTests \
          -skip-testing:EchoTests/SQLiteIntegrationTests \
          -skip-testing:EchoTests/EchoSenseIntegrationTests \
          -skip-testing:EchoTests/MSSQLConnectionTests \
          -skip-testing:EchoTests/MSSQLQueryTests \
          -skip-testing:EchoTests/MSSQLSchemaDiscoveryTests \
          -skip-testing:EchoTests/MSSQLMetadataTests \
          -skip-testing:EchoTests/MSSQLTableOperationsTests \
          -skip-testing:EchoTests/MSSQLColumnTests \
          -skip-testing:EchoTests/MSSQLConstraintTests \
          -skip-testing:EchoTests/MSSQLIndexTests \
          -skip-testing:EchoTests/MSSQLViewTests \
          -skip-testing:EchoTests/MSSQLProcedureTests \
          -skip-testing:EchoTests/MSSQLFunctionTests \
          -skip-testing:EchoTests/MSSQLTriggerTests \
          -skip-testing:EchoTests/MSSQLTransactionTests \
          -skip-testing:EchoTests/MSSQLSecurityTests \
          -skip-testing:EchoTests/MSSQLAgentTests \
          -skip-testing:EchoTests/MSSQLActivityMonitorTests \
          -skip-testing:EchoTests/MSSQLDatabaseAdminTests \
          -skip-testing:EchoTests/MSSQLDataTypeNumericTests \
          -skip-testing:EchoTests/MSSQLDataTypeStringTests \
          -skip-testing:EchoTests/MSSQLDataTypeDateTimeTests \
          -skip-testing:EchoTests/MSSQLDataTypeBinaryTests \
          -skip-testing:EchoTests/MSSQLStreamingTests \
          -skip-testing:EchoTests/MSSQLStreamingSpoolTests \
          -skip-testing:EchoTests/PGConnectionTests \
          -skip-testing:EchoTests/PGQueryTests \
          -skip-testing:EchoTests/PGSchemaDiscoveryTests \
          -skip-testing:EchoTests/PGMetadataTests \
          -skip-testing:EchoTests/PGTableOperationsTests \
          -skip-testing:EchoTests/PGColumnTests \
          -skip-testing:EchoTests/PGConstraintTests \
          -skip-testing:EchoTests/PGIndexTests \
          -skip-testing:EchoTests/PGViewTests \
          -skip-testing:EchoTests/PGFunctionTests \
          -skip-testing:EchoTests/PGTriggerTests \
          -skip-testing:EchoTests/PGTransactionTests \
          -skip-testing:EchoTests/PGSecurityTests \
          -skip-testing:EchoTests/PGExtensionTests \
          -skip-testing:EchoTests/PGActivityMonitorTests \
          -skip-testing:EchoTests/PGSequenceTests \
          -skip-testing:EchoTests/PGDataTypeNumericTests \
          -skip-testing:EchoTests/PGDataTypeStringTests \
          -skip-testing:EchoTests/PGDataTypeDateTimeTests \
          -skip-testing:EchoTests/PGDataTypeSpecialTests \
          -skip-testing:EchoTests/PGStreamingTests \
          -skip-testing:EchoTests/PGStreamingSpoolTests \
          -skip-testing:EchoTests/SQLiteConnectionTests \
          -skip-testing:EchoTests/SQLiteQueryTests \
          -skip-testing:EchoTests/SQLiteSchemaTests \
          -skip-testing:EchoTests/SQLiteTableOperationsTests \
          -skip-testing:EchoTests/SQLiteDataTypeTests \
          -skip-testing:EchoTests/SessionProtocolComplianceTests \
          -skip-testing:EchoTests/FactoryConnectionTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

  integration-tests:
    runs-on: [self-hosted, echo-test-server]
    needs: test
    strategy:
      matrix:
        include:
          - db: mssql-2022
            ECHO_MSSQL_VERSION: "2022-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: mssql-2019
            ECHO_MSSQL_VERSION: "2019-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: mssql-2017
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: mssql-2008r2
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "100"
          - db: mssql-2012
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "110"
          - db: mssql-2014
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "120"
          - db: mssql-2016
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "130"
          - db: mssql-2025
            ECHO_MSSQL_VERSION: "2025-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: postgres-14
            ECHO_PG_VERSION: "14"
          - db: postgres-15
            ECHO_PG_VERSION: "15"
          - db: postgres-16
            ECHO_PG_VERSION: "16"
          - db: postgres-17
            ECHO_PG_VERSION: "17"
          - db: postgres-18
            ECHO_PG_VERSION: "18"
          - db: postgres-latest
            ECHO_PG_VERSION: "latest"
      fail-fast: false
    env:
      USE_DOCKER: "1"
      ECHO_MSSQL_PORT: "14332"
      ECHO_PG_PORT: "54322"
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true

    - name: Clear SPM cache
      run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories

    - name: Verify Docker
      run: |
        docker info > /dev/null 2>&1 || (echo "Docker not running" && exit 1)
        echo "Docker is ready"

    - name: Run Integration Tests (MSSQL)
      if: startsWith(matrix.db, 'mssql')
      env:
        ECHO_MSSQL_VERSION: ${{ matrix.ECHO_MSSQL_VERSION }}
        ECHO_MSSQL_COMPAT: ${{ matrix.ECHO_MSSQL_COMPAT }}
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -only-testing:EchoTests/MSSQLConnectionTests \
          -only-testing:EchoTests/MSSQLQueryTests \
          -only-testing:EchoTests/MSSQLSchemaDiscoveryTests \
          -only-testing:EchoTests/MSSQLMetadataTests \
          -only-testing:EchoTests/MSSQLTableOperationsTests \
          -only-testing:EchoTests/MSSQLColumnTests \
          -only-testing:EchoTests/MSSQLConstraintTests \
          -only-testing:EchoTests/MSSQLIndexTests \
          -only-testing:EchoTests/MSSQLViewTests \
          -only-testing:EchoTests/MSSQLProcedureTests \
          -only-testing:EchoTests/MSSQLFunctionTests \
          -only-testing:EchoTests/MSSQLTriggerTests \
          -only-testing:EchoTests/MSSQLTransactionTests \
          -only-testing:EchoTests/MSSQLSecurityTests \
          -only-testing:EchoTests/MSSQLAgentTests \
          -only-testing:EchoTests/MSSQLActivityMonitorTests \
          -only-testing:EchoTests/MSSQLDatabaseAdminTests \
          -only-testing:EchoTests/MSSQLDataTypeNumericTests \
          -only-testing:EchoTests/MSSQLDataTypeStringTests \
          -only-testing:EchoTests/MSSQLDataTypeDateTimeTests \
          -only-testing:EchoTests/MSSQLDataTypeBinaryTests \
          -only-testing:EchoTests/MSSQLStreamingTests \
          -only-testing:EchoTests/MSSQLStreamingSpoolTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Run Integration Tests (Postgres)
      if: startsWith(matrix.db, 'postgres')
      env:
        ECHO_PG_VERSION: ${{ matrix.ECHO_PG_VERSION }}
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -only-testing:EchoTests/PGConnectionTests \
          -only-testing:EchoTests/PGQueryTests \
          -only-testing:EchoTests/PGSchemaDiscoveryTests \
          -only-testing:EchoTests/PGMetadataTests \
          -only-testing:EchoTests/PGTableOperationsTests \
          -only-testing:EchoTests/PGColumnTests \
          -only-testing:EchoTests/PGConstraintTests \
          -only-testing:EchoTests/PGIndexTests \
          -only-testing:EchoTests/PGViewTests \
          -only-testing:EchoTests/PGFunctionTests \
          -only-testing:EchoTests/PGTriggerTests \
          -only-testing:EchoTests/PGTransactionTests \
          -only-testing:EchoTests/PGSecurityTests \
          -only-testing:EchoTests/PGExtensionTests \
          -only-testing:EchoTests/PGActivityMonitorTests \
          -only-testing:EchoTests/PGSequenceTests \
          -only-testing:EchoTests/PGDataTypeNumericTests \
          -only-testing:EchoTests/PGDataTypeStringTests \
          -only-testing:EchoTests/PGDataTypeDateTimeTests \
          -only-testing:EchoTests/PGDataTypeSpecialTests \
          -only-testing:EchoTests/PGStreamingTests \
          -only-testing:EchoTests/PGStreamingSpoolTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.db }}
        path: TestResults-${{ matrix.db }}.xcresult

  sqlite-and-ui-tests:
    runs-on: [self-hosted, echo-test-server]
    needs: test
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer || true

    - name: Clear SPM cache
      run: rm -rf ~/Library/Caches/org.swift.swiftpm/repositories

    - name: Run SQLite & Cross-Dialect Integration Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-sqlite \
          -only-testing:EchoTests/SQLiteConnectionTests \
          -only-testing:EchoTests/SQLiteQueryTests \
          -only-testing:EchoTests/SQLiteSchemaTests \
          -only-testing:EchoTests/SQLiteTableOperationsTests \
          -only-testing:EchoTests/SQLiteDataTypeTests \
          -only-testing:EchoTests/SessionProtocolComplianceTests \
          -only-testing:EchoTests/FactoryConnectionTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Run UI Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-ui \
          -only-testing:EchoUITests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-sqlite-ui
        path: |
          TestResults-sqlite.xcresult
          TestResults-ui.xcresult

  build:
    runs-on: macos-26
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Build App
      run: |
        xcodebuild -project Echo.xcodeproj \
          -scheme Echo \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_ENTITLEMENTS="" \
          CODE_SIGNING_ALLOWED=NO \
          AD_HOC_CODE_SIGNING_ALLOWED=NO

    - name: Package App
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/

        echo "Preparing bundle for distribution..."
        chmod -R u+w release/Echo.app
        xattr -rc release/Echo.app

        # Apple Silicon REQUIRES at least an ad-hoc signature to run.
        # We apply an ad-hoc signature so macOS doesn't say "can't be opened".
        echo "Applying ad-hoc signature..."
        codesign --force --deep -s - release/Echo.app

        echo "Verifying signature state:"
        codesign -vvvv release/Echo.app

        cd release
        ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip
        rm -rf Echo.app

    - name: Get Version
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      id: get_version
      run: |
        APP_PATH="build/Build/Products/Release/Echo.app"
        VERSION=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleShortVersionString)
        BUILD=$(defaults read "$(pwd)/$APP_PATH/Contents/Info.plist" CFBundleVersion)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "build=$BUILD" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-$BUILD" >> $GITHUB_OUTPUT

    - name: Setup Sparkle CLI
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        cp bin/generate_appcast .

    - name: Generate Appcast
      if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        rm -rf ~/Library/Caches/Sparkle_generate_appcast

        # Use --disable-nested-code-check to ignore the fact that we used an ad-hoc signature
        # instead of a proper Developer ID signature.
        if [ -z "$SPARKLE_PRIVATE_KEY" ]; then
          ./generate_appcast --disable-nested-code-check release/
        else
          echo "$SPARKLE_PRIVATE_KEY" | ./generate_appcast --disable-nested-code-check --ed-key-file - release/
        fi
        mv release/appcast.xml .
        mv release/Echo.zip .

    - name: Create Release
      if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        files: |
          Echo.zip
          appcast.xml
        generate_release_notes: true
