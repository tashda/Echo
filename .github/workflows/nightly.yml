name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily
  workflow_dispatch:

jobs:
  # ── Full Compatibility Matrix (same as pipeline Step 3) ──────────────────
  compatibility-matrix:
    name: "${{ matrix.db }}"
    runs-on: [self-hosted, echo-test-server]
    strategy:
      fail-fast: false
      matrix:
        include:
          # SQL Server versions
          - db: "MSSQL 2008 R2"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "100"
          - db: "MSSQL 2012"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "110"
          - db: "MSSQL 2014"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "120"
          - db: "MSSQL 2016"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "130"
          - db: "MSSQL 2017"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2019"
            type: mssql
            ECHO_MSSQL_VERSION: "2019-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2022"
            type: mssql
            ECHO_MSSQL_VERSION: "2022-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2025"
            type: mssql
            ECHO_MSSQL_VERSION: "2025-latest"
            ECHO_MSSQL_COMPAT: ""
          # Postgres versions
          - db: "Postgres 14"
            type: postgres
            ECHO_PG_VERSION: "14"
          - db: "Postgres 15"
            type: postgres
            ECHO_PG_VERSION: "15"
          - db: "Postgres 16"
            type: postgres
            ECHO_PG_VERSION: "16"
          - db: "Postgres 17"
            type: postgres
            ECHO_PG_VERSION: "17"
          - db: "Postgres 18"
            type: postgres
            ECHO_PG_VERSION: "18"
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      ECHO_MSSQL_PORT: "14332"
      ECHO_PG_PORT: "54322"
      USE_DOCKER: "1"
    steps:
    - uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

    - name: Verify Docker (via Colima)
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          echo "Colima not running — starting..."
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
        echo "Docker is ready"

    - name: Run MSSQL Compatibility Tests
      if: matrix.type == 'mssql'
      env:
        ECHO_MSSQL_VERSION: ${{ matrix.ECHO_MSSQL_VERSION }}
        ECHO_MSSQL_COMPAT: ${{ matrix.ECHO_MSSQL_COMPAT }}
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan IntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Run Postgres Compatibility Tests
      if: matrix.type == 'postgres'
      env:
        ECHO_PG_VERSION: ${{ matrix.ECHO_PG_VERSION }}
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan IntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.db }}
        path: "TestResults-*.xcresult"
