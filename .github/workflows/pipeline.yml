name: "Echo App: Validation & Delivery Pipeline"

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: Compilation & Core Unit Tests (GitHub-hosted) ────────────────
  unit-tests:
    name: "Step 1: Compilation & Unit Tests"
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Run Unit Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan UnitTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-unit \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Unit Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-unit
        path: TestResults-unit.xcresult

  # ── Step 2: Integration Tests (self-hosted, every push) ──────────────────
  integration-tests:
    name: "Step 2: Integration Tests"
    needs: unit-tests
    runs-on: [self-hosted, echo-test-server]
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/sqlserver-nio
        ref: dev
        path: vendor/sqlserver-nio
    - uses: actions/checkout@v4
      with:
        repository: tashda/postgres-wire
        ref: dev
        path: vendor/postgres-wire

    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

    - name: Verify Docker (via Colima)
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          echo "Colima not running — starting..."
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
        echo "Docker is ready"
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

    - name: Ensure PostgreSQL client tools
      run: |
        if ! command -v brew >/dev/null 2>&1; then
          echo "Homebrew is required on the self-hosted runner to provide PostgreSQL client tools" >&2
          exit 1
        fi
        brew list libpq >/dev/null 2>&1 || brew install libpq
        LIBPQ_BIN="$(brew --prefix libpq)/bin"
        echo "ECHO_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
        echo "TEST_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"

    - name: Bootstrap validated database fixtures
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh all

    - name: Run Integration Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan DatabaseIntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-integration \
          -disable-concurrent-destination-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Verify Integration Results
      if: always()
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path TestResults-integration.xcresult \
          --label "Step 2 integration tests" \
          --min-executed 1

    - name: Upload Integration Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-integration
        path: TestResults-integration.xcresult

  # ── Step 3: Full Compatibility Matrix (self-hosted, PRs to main only) ────
  # Runs the full test suite against every supported database version.
  # This is the gate before production — every version must pass.
  compatibility-matrix:
    name: "Step 3: ${{ matrix.db }}"
    needs: integration-tests
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.ref == 'refs/heads/main')
    runs-on: [self-hosted, echo-test-server]
    strategy:
      fail-fast: false
      matrix:
        include:
          # SQL Server versions (compat level emulation via 2017 image)
          - db: "MSSQL 2008 R2"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "100"
          - db: "MSSQL 2012"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "110"
          - db: "MSSQL 2014"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "120"
          - db: "MSSQL 2016"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "130"
          - db: "MSSQL 2017"
            type: mssql
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2019"
            type: mssql
            ECHO_MSSQL_VERSION: "2019-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2022"
            type: mssql
            ECHO_MSSQL_VERSION: "2022-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2025"
            type: mssql
            ECHO_MSSQL_VERSION: "2025-latest"
            ECHO_MSSQL_COMPAT: ""
          # Postgres versions
          - db: "Postgres 14"
            type: postgres
            ECHO_PG_VERSION: "14"
          - db: "Postgres 15"
            type: postgres
            ECHO_PG_VERSION: "15"
          - db: "Postgres 16"
            type: postgres
            ECHO_PG_VERSION: "16"
          - db: "Postgres 17"
            type: postgres
            ECHO_PG_VERSION: "17"
          - db: "Postgres 18"
            type: postgres
            ECHO_PG_VERSION: "18"
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/sqlserver-nio
        ref: dev
        path: vendor/sqlserver-nio
    - uses: actions/checkout@v4
      with:
        repository: tashda/postgres-wire
        ref: dev
        path: vendor/postgres-wire

    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

    - name: Verify Docker (via Colima)
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          echo "Colima not running — starting..."
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
        echo "Docker is ready"

    - name: Ensure PostgreSQL client tools
      run: |
        if ! command -v brew >/dev/null 2>&1; then
          echo "Homebrew is required on the self-hosted runner to provide PostgreSQL client tools" >&2
          exit 1
        fi
        brew list libpq >/dev/null 2>&1 || brew install libpq
        LIBPQ_BIN="$(brew --prefix libpq)/bin"
        echo "ECHO_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
        echo "TEST_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"

    - name: Run MSSQL Compatibility Tests
      if: matrix.type == 'mssql'
      env:
        ECHO_MSSQL_VERSION: ${{ matrix.ECHO_MSSQL_VERSION }}
        ECHO_MSSQL_COMPAT: ${{ matrix.ECHO_MSSQL_COMPAT }}
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh sqlserver
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan MSSQLCompatibilityTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Verify MSSQL Compatibility Results
      if: always() && matrix.type == 'mssql'
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path "TestResults-${{ matrix.db }}.xcresult" \
          --label "${{ matrix.db }} compatibility tests" \
          --min-executed 1

    - name: Run Postgres Compatibility Tests
      if: matrix.type == 'postgres'
      env:
        ECHO_PG_VERSION: ${{ matrix.ECHO_PG_VERSION }}
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh postgres
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan PostgresCompatibilityTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Verify Postgres Compatibility Results
      if: always() && matrix.type == 'postgres'
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path "TestResults-${{ matrix.db }}.xcresult" \
          --label "${{ matrix.db }} compatibility tests" \
          --min-executed 1

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.db }}
        path: "TestResults-*.xcresult"

  # ── Step 4: Production Build & Sparkle Release ───────────────────────────
  release:
    name: "Step 4: Production Build & Release"
    runs-on: macos-26
    needs: [unit-tests, integration-tests, compatibility-matrix]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Determine version
      id: version
      run: |
        # Read the marketing version from the Xcode project (e.g. "1.0", "1.1")
        MARKETING_VERSION=$(xcodebuild -project Echo.xcodeproj -scheme Echo -showBuildSettings 2>/dev/null \
          | grep 'MARKETING_VERSION' | head -1 | awk '{print $3}')
        echo "Marketing version: $MARKETING_VERSION"

        # Find the highest existing patch for this marketing version from git tags
        # Tags follow the pattern v1.0.0, v1.0.1, v1.0.2, ...
        LATEST_TAG=$(git tag --list "v${MARKETING_VERSION}.*" --sort=-version:refname \
          | head -1 \
        )
        LATEST_PATCH=$(printf "%s" "$LATEST_TAG" | sed "s/v${MARKETING_VERSION}\.\([0-9]*\)/\1/")

        if [ -z "$LATEST_PATCH" ]; then
          PATCH=0
        else
          PATCH=$((LATEST_PATCH + 1))
        fi

        FULL_VERSION="${MARKETING_VERSION}.${PATCH}"
        echo "Next version: $FULL_VERSION"
        echo "previous_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        echo "full=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "patch=$PATCH" >> $GITHUB_OUTPUT
        echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT

    - name: Build App (Release)
      run: |
        xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Release -derivedDataPath build \
          MARKETING_VERSION=${{ steps.version.outputs.full }} \
          CURRENT_PROJECT_VERSION=${{ steps.version.outputs.patch }} \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    - name: Package & Sign (Ad-Hoc)
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        codesign --force --deep -s - release/Echo.app
        cd release
        ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip

    - name: Setup Sparkle & Generate Appcast
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
          echo "$SPARKLE_PRIVATE_KEY" | ./bin/generate_appcast --ed-key-file - release/
        else
          ./bin/generate_appcast release/
        fi
        mv release/appcast.xml .
        mv release/Echo.zip .

    - name: Generate Release Notes
      run: |
        python3 .github/scripts/generate_release_notes.py \
          --repo-key echo \
          --repo-name Echo \
          --new-tag "${{ steps.version.outputs.tag }}" \
          --previous-tag "${{ steps.version.outputs.previous_tag }}" \
          --output release-notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Echo ${{ steps.version.outputs.full }}
        files: |
          Echo.zip
          appcast.xml
        body_path: release-notes.md
