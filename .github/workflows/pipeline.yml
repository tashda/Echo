name: "Echo App: Validation & Delivery Pipeline"

on:
  push:
    branches: [ dev, main ]
  pull_request:
    branches: [ dev, main ]
  workflow_dispatch:

concurrency:
  group: pipeline-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tier 1: Compilation & Core Unit Tests (GitHub-hosted) ────────────────
  unit-tests:
    name: "Step 1: Compilation & Unit Tests"
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Run Unit Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-unit \
          -skip-testing:EchoTests/MSSQLIntegrationTests \
          -skip-testing:EchoTests/PostgresIntegrationTests \
          -skip-testing:EchoTests/MySQLIntegrationTests \
          -skip-testing:EchoTests/SQLiteIntegrationTests \
          -skip-testing:EchoTests/EchoSenseIntegrationTests \
          -skip-testing:EchoTests/MSSQLConnectionTests \
          -skip-testing:EchoTests/MSSQLQueryTests \
          -skip-testing:EchoTests/MSSQLSchemaDiscoveryTests \
          -skip-testing:EchoTests/MSSQLMetadataTests \
          -skip-testing:EchoTests/MSSQLTableOperationsTests \
          -skip-testing:EchoTests/MSSQLColumnTests \
          -skip-testing:EchoTests/MSSQLConstraintTests \
          -skip-testing:EchoTests/MSSQLIndexTests \
          -skip-testing:EchoTests/MSSQLViewTests \
          -skip-testing:EchoTests/MSSQLProcedureTests \
          -skip-testing:EchoTests/MSSQLFunctionTests \
          -skip-testing:EchoTests/MSSQLTriggerTests \
          -skip-testing:EchoTests/MSSQLTransactionTests \
          -skip-testing:EchoTests/MSSQLSecurityTests \
          -skip-testing:EchoTests/MSSQLAgentTests \
          -skip-testing:EchoTests/MSSQLActivityMonitorTests \
          -skip-testing:EchoTests/MSSQLDatabaseAdminTests \
          -skip-testing:EchoTests/MSSQLDataTypeNumericTests \
          -skip-testing:EchoTests/MSSQLDataTypeStringTests \
          -skip-testing:EchoTests/MSSQLDataTypeDateTimeTests \
          -skip-testing:EchoTests/MSSQLDataTypeBinaryTests \
          -skip-testing:EchoTests/MSSQLStreamingTests \
          -skip-testing:EchoTests/MSSQLStreamingSpoolTests \
          -skip-testing:EchoTests/PGConnectionTests \
          -skip-testing:EchoTests/PGQueryTests \
          -skip-testing:EchoTests/PGSchemaDiscoveryTests \
          -skip-testing:EchoTests/PGMetadataTests \
          -skip-testing:EchoTests/PGTableOperationsTests \
          -skip-testing:EchoTests/PGColumnTests \
          -skip-testing:EchoTests/PGConstraintTests \
          -skip-testing:EchoTests/PGIndexTests \
          -skip-testing:EchoTests/PGViewTests \
          -skip-testing:EchoTests/PGFunctionTests \
          -skip-testing:EchoTests/PGTriggerTests \
          -skip-testing:EchoTests/PGTransactionTests \
          -skip-testing:EchoTests/PGSecurityTests \
          -skip-testing:EchoTests/PGExtensionTests \
          -skip-testing:EchoTests/PGActivityMonitorTests \
          -skip-testing:EchoTests/PGSequenceTests \
          -skip-testing:EchoTests/PGDataTypeNumericTests \
          -skip-testing:EchoTests/PGDataTypeStringTests \
          -skip-testing:EchoTests/PGDataTypeDateTimeTests \
          -skip-testing:EchoTests/PGDataTypeSpecialTests \
          -skip-testing:EchoTests/PGStreamingTests \
          -skip-testing:EchoTests/PGStreamingSpoolTests \
          -skip-testing:EchoTests/SQLiteConnectionTests \
          -skip-testing:EchoTests/SQLiteQueryTests \
          -skip-testing:EchoTests/SQLiteSchemaTests \
          -skip-testing:EchoTests/SQLiteTableOperationsTests \
          -skip-testing:EchoTests/SQLiteDataTypeTests \
          -skip-testing:EchoTests/SessionProtocolComplianceTests \
          -skip-testing:EchoTests/FactoryConnectionTests \
          -skip-testing:EchoTests/MSSQLMaintenanceTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload Unit Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-unit
        path: TestResults-unit.xcresult

  # ── Tier 2: SQLite & Cross-Dialect Tests (GitHub-hosted — no Docker needed) ─
  sqlite-tests:
    name: "Step 2: SQLite & Cross-Dialect Tests"
    runs-on: macos-26
    needs: unit-tests
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Run SQLite & Cross-Dialect Tests
      run: |
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-sqlite \
          -only-testing:EchoTests/SQLiteConnectionTests \
          -only-testing:EchoTests/SQLiteQueryTests \
          -only-testing:EchoTests/SQLiteSchemaTests \
          -only-testing:EchoTests/SQLiteTableOperationsTests \
          -only-testing:EchoTests/SQLiteDataTypeTests \
          -only-testing:EchoTests/SessionProtocolComplianceTests \
          -only-testing:EchoTests/FactoryConnectionTests \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Upload SQLite Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-sqlite
        path: TestResults-sqlite.xcresult

  # ── Tier 3: Docker Integration Tests (self-hosted, optional) ─────────────
  # These tests require a self-hosted runner with Docker installed.
  # They are NOT required for the release pipeline — they run as bonus
  # validation on PRs to main. If Docker is unavailable, tests are skipped.
  docker-integration:
    name: "Step 3: Docker Integration - ${{ matrix.name }}"
    needs: unit-tests
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.ref == 'refs/heads/main')
    runs-on: [self-hosted, echo-test-server]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "Modern SQL Stack (2022)"
            type: "mssql-modern"
          - name: "Postgres Stack (14-18)"
            type: "postgres"
    env:
      ECHO_MSSQL_PORT: "14332"
      ECHO_PG_PORT: "54322"
    steps:
    - uses: actions/checkout@v4

    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        security set-keychain-settings ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true

    - name: Check Docker availability
      id: docker-check
      run: |
        # Try multiple Docker socket paths
        for sock in "/var/run/docker.sock" "$HOME/.docker/run/docker.sock" "$HOME/.colima/default/docker.sock" "$HOME/.orbstack/run/docker.sock"; do
          if [ -S "$sock" ]; then
            export DOCKER_HOST="unix://$sock"
            if docker info > /dev/null 2>&1; then
              echo "docker_available=true" >> $GITHUB_OUTPUT
              echo "docker_host=unix://$sock" >> $GITHUB_OUTPUT
              echo "Docker available via $sock"
              exit 0
            fi
          fi
        done
        echo "docker_available=false" >> $GITHUB_OUTPUT
        echo "::warning::Docker is not available on this runner — skipping integration tests"

    - name: Run Modern SQL Stack Tests
      if: matrix.type == 'mssql-modern' && steps.docker-check.outputs.docker_available == 'true'
      env:
        DOCKER_HOST: ${{ steps.docker-check.outputs.docker_host }}
        ECHO_MSSQL_VERSION: "2022-latest"
      run: |
        xcodebuild test -project Echo.xcodeproj -scheme Echo -destination 'platform=macOS' \
          -only-testing:EchoTests/MSSQLConnectionTests \
          -only-testing:EchoTests/MSSQLQueryTests \
          -only-testing:EchoTests/MSSQLMaintenanceTests \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Run Postgres Matrix
      if: matrix.type == 'postgres' && steps.docker-check.outputs.docker_available == 'true'
      env:
        DOCKER_HOST: ${{ steps.docker-check.outputs.docker_host }}
      run: |
        for ver in "14" "16" "18"; do
          echo "Testing Postgres $ver..."
          export ECHO_PG_VERSION=$ver
          xcodebuild test -project Echo.xcodeproj -scheme Echo -destination 'platform=macOS' \
            -only-testing:EchoTests/PGConnectionTests \
            -only-testing:EchoTests/PGQueryTests \
            -disable-concurrent-testing \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
        done

    - name: Skip notice
      if: steps.docker-check.outputs.docker_available != 'true'
      run: echo "::notice::Docker integration tests skipped — Docker not available on this runner"

    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.type }}
        path: "*.xcresult"
        if-no-files-found: ignore

  # ── Tier 4: Production Build & Sparkle Release ───────────────────────────
  release:
    name: "Step 4: Production Build & Release"
    runs-on: macos-26
    needs: [unit-tests, sqlite-tests]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Build App (Release)
      run: |
        xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Release -derivedDataPath build \
          CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

    - name: Package & Sign (Ad-Hoc)
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        codesign --force --deep -s - release/Echo.app
        cd release
        ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip

    - name: Get Version
      id: get_version
      run: |
        VERSION=$(defaults read "$(pwd)/build/Build/Products/Release/Echo.app/Contents/Info.plist" CFBundleShortVersionString)
        BUILD=$(defaults read "$(pwd)/build/Build/Products/Release/Echo.app/Contents/Info.plist" CFBundleVersion)
        echo "tag=v$VERSION-$BUILD" >> $GITHUB_OUTPUT

    - name: Setup Sparkle & Generate Appcast
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
          echo "$SPARKLE_PRIVATE_KEY" | ./bin/generate_appcast --ed-key-file - release/
        else
          ./bin/generate_appcast release/
        fi
        mv release/appcast.xml .
        mv release/Echo.zip .

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        files: |
          Echo.zip
          appcast.xml
        generate_release_notes: true
