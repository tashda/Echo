name: "CI (Full)"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: "Step 1: Build"
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Build
      run: |
        xcodebuild build-for-testing -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan UnitTests \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep' \

  unit-tests:
    name: "Step 2: Unit Tests"
    needs: build
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'
    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo
    - name: Run Unit Tests
      run: |
        find . -maxdepth 1 -name "TestResults-unit*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo -testPlan UnitTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-unit \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-unit
        path: TestResults-unit.xcresult

  # ── SQLite Integration Tests (no Docker needed) ────────────────────────────

  sqlite-integration-tests:
    name: "Step 3: SQLite Integration Tests"
    needs: unit-tests
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'
    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo
    - name: Run SQLite Integration Tests
      run: |
        find . -maxdepth 1 -name "TestResults-sqlite*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo -testPlan SQLiteIntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-sqlite \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-sqlite
        path: TestResults-sqlite.xcresult

  # ── Production Build & Release ──────────────────────────────────────────────

  release:
    name: "Step 4: Production Build & Release"
    runs-on: macos-26
    needs: [unit-tests, sqlite-integration-tests]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'
    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo
    - name: Determine version
      id: version
      run: |
        MARKETING_VERSION=$(xcodebuild -project Echo.xcodeproj -scheme Echo -showBuildSettings 2>/dev/null \
          | grep 'MARKETING_VERSION' | head -1 | awk '{print $3}')
        LATEST_TAG=$(git tag --list "v${MARKETING_VERSION}.*" --sort=-version:refname | head -1)
        LATEST_PATCH=$(printf "%s" "$LATEST_TAG" | sed "s/v${MARKETING_VERSION}\.\([0-9]*\)/\1/")
        PATCH=${LATEST_PATCH:+$((LATEST_PATCH + 1))}
        PATCH=${PATCH:-0}
        FULL_VERSION="${MARKETING_VERSION}.${PATCH}"
        echo "full=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "previous_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        echo "patch=$PATCH" >> $GITHUB_OUTPUT
        echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
    - name: Build Release
      run: |
        xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Release -derivedDataPath build \
          MARKETING_VERSION=${{ steps.version.outputs.full }} \
          CURRENT_PROJECT_VERSION=${{ steps.version.outputs.patch }} \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Package
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        codesign --force --deep -s - release/Echo.app
        cd release && ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip
    - name: Sparkle & Appcast
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
          echo "$SPARKLE_PRIVATE_KEY" | ./bin/generate_appcast --ed-key-file - release/
        else
          ./bin/generate_appcast release/
        fi
        mv release/appcast.xml . && mv release/Echo.zip .
    - name: Release Notes
      run: |
        python3 .github/scripts/generate_release_notes.py \
          --repo-key echo --repo-name Echo \
          --new-tag "${{ steps.version.outputs.tag }}" \
          --previous-tag "${{ steps.version.outputs.previous_tag }}" \
          --output release-notes.md
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Echo ${{ steps.version.outputs.full }}
        files: |
          Echo.zip
          appcast.xml
        body_path: release-notes.md
