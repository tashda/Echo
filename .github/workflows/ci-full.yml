name: "CI (Full)"

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ci-full-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    name: "Step 1: Build"
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Build
      run: |
        xcodebuild build-for-testing -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan UnitTests \
          -destination 'platform=macOS' \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep' \

  unit-tests:
    name: "Step 2: Unit Tests"
    needs: build
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'
    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo
    - name: Run Unit Tests
      run: |
        find . -maxdepth 1 -name "TestResults-unit*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo -testPlan UnitTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-unit \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-unit
        path: TestResults-unit.xcresult

  # ── Self-hosted runner steps ─────────────────────────────────────────────

  integration-tests:
    name: "Step 3: Integration Tests"
    needs: unit-tests
    runs-on: [self-hosted, echo-test-server]
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/sqlserver-nio
        ref: dev
        path: vendor/sqlserver-nio
    - uses: actions/checkout@v4
      with:
        repository: tashda/postgres-wire
        ref: dev
        path: vendor/postgres-wire
    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign:,teamid:,apple-events: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
    - name: Suppress macOS prompts
      run: |
        defaults write /Library/Preferences/com.apple.networkd EnableLoopbackLocalNetwork -bool true 2>/dev/null || true
        defaults write com.apple.linkd autoShortcut -bool false 2>/dev/null || true
        defaults write NSGlobalDomain NSAppSleepDisabled -bool YES 2>/dev/null || true
    - name: Verify Docker
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
        docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
    - name: Ensure PostgreSQL client tools
      run: |
        brew list libpq >/dev/null 2>&1 || brew install libpq
        LIBPQ_BIN="$(brew --prefix libpq)/bin"
        echo "ECHO_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
        echo "TEST_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
    - name: Bootstrap database fixtures
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh all
    - name: Run Integration Tests
      run: |
        find . -maxdepth 1 -name "TestResults-integration*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj -derivedDataPath DerivedData-Echo \
          -scheme Echo -testPlan DatabaseIntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-integration \
          -disable-concurrent-destination-testing \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Verify Results
      if: always()
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path TestResults-integration.xcresult \
          --label "Integration tests" --min-executed 1
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-integration
        path: TestResults-integration.xcresult

  extended-integration:
    name: "Step 4: Extended Integration Tests"
    needs: integration-tests
    runs-on: [self-hosted, echo-test-server]
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/sqlserver-nio
        ref: dev
        path: vendor/sqlserver-nio
    - uses: actions/checkout@v4
      with:
        repository: tashda/postgres-wire
        ref: dev
        path: vendor/postgres-wire
    - name: Prepare environment
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-keychain-settings ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign:,teamid:,apple-events: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        defaults write /Library/Preferences/com.apple.networkd EnableLoopbackLocalNetwork -bool true 2>/dev/null || true
        defaults write com.apple.linkd autoShortcut -bool false 2>/dev/null || true
        defaults write NSGlobalDomain NSAppSleepDisabled -bool YES 2>/dev/null || true
    - name: Verify Docker
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
    - name: Ensure PostgreSQL client tools
      run: |
        brew list libpq >/dev/null 2>&1 || brew install libpq
        LIBPQ_BIN="$(brew --prefix libpq)/bin"
        echo "ECHO_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
        echo "TEST_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
    - name: Bootstrap database fixtures
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh all
    - name: Run Extended Integration Tests
      run: |
        find . -maxdepth 1 -name "TestResults-extended*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj -derivedDataPath DerivedData-Echo \
          -scheme Echo -testPlan ExtendedIntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-extended \
          -disable-concurrent-destination-testing \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Verify Results
      if: always()
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path TestResults-extended.xcresult \
          --label "Extended integration tests" --min-executed 1
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-extended
        path: TestResults-extended.xcresult

  # ── Step 5: Compatibility Matrix ─────────────────────────────────────────

  mssql-compatibility:
    name: "Step 5: ${{ matrix.db }}"
    needs: integration-tests
    runs-on: [self-hosted, echo-test-server]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - db: "MSSQL 2008 R2"
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "100"
          - db: "MSSQL 2012"
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "110"
          - db: "MSSQL 2014"
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "120"
          - db: "MSSQL 2016"
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: "130"
          - db: "MSSQL 2017"
            ECHO_MSSQL_VERSION: "2017-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2019"
            ECHO_MSSQL_VERSION: "2019-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2022"
            ECHO_MSSQL_VERSION: "2022-latest"
            ECHO_MSSQL_COMPAT: ""
          - db: "MSSQL 2025"
            ECHO_MSSQL_VERSION: "2025-latest"
            ECHO_MSSQL_COMPAT: ""
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
      ECHO_MSSQL_VERSION: ${{ matrix.ECHO_MSSQL_VERSION }}
      ECHO_MSSQL_COMPAT: ${{ matrix.ECHO_MSSQL_COMPAT }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/sqlserver-nio
        ref: dev
        path: vendor/sqlserver-nio
    - name: Prepare
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign:,teamid:,apple-events: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        defaults write NSGlobalDomain NSAppSleepDisabled -bool YES 2>/dev/null || true
    - name: Verify Docker
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
    - name: Bootstrap ${{ matrix.db }}
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh sqlserver
    - name: Run ${{ matrix.db }} Tests
      run: |
        find . -maxdepth 1 -name "TestResults-${{ matrix.db }}*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj -derivedDataPath DerivedData-Echo \
          -scheme Echo -testPlan MSSQLCompatibilityTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-${{ matrix.db }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Verify Results
      if: always()
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path "TestResults-${{ matrix.db }}.xcresult" \
          --label "${{ matrix.db }}" --min-executed 1
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.db }}
        path: "TestResults-*.xcresult"

  postgres-compatibility:
    name: "Step 5: Postgres ${{ matrix.version }}"
    needs: integration-tests
    runs-on: [self-hosted, echo-test-server]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        version: ["14", "15", "16", "17", "18"]
    env:
      DOCKER_HOST: "unix:///Users/k/.colima/default/docker.sock"
      USE_DOCKER: "1"
      ECHO_REQUIRE_VALIDATED_FIXTURES: "1"
      ECHO_PG_VERSION: ${{ matrix.version }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/checkout@v4
      with:
        repository: tashda/postgres-wire
        ref: dev
        path: vendor/postgres-wire
    - name: Prepare
      run: |
        security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security set-key-partition-list -S apple-tool:,apple:,codesign:,teamid:,apple-events: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
        security delete-generic-password -s "dk.tippr.echo" ~/Library/Keychains/login.keychain-db 2>/dev/null || true
        defaults write NSGlobalDomain NSAppSleepDisabled -bool YES 2>/dev/null || true
    - name: Verify Docker
      run: |
        export PATH="/usr/local/bin:$PATH"
        if ! /usr/local/bin/colima status > /dev/null 2>&1; then
          /usr/local/bin/colima start --cpu 4 --memory 8 --arch x86_64
        fi
        docker info > /dev/null 2>&1
    - name: Ensure PostgreSQL client tools
      run: |
        brew list libpq >/dev/null 2>&1 || brew install libpq
        LIBPQ_BIN="$(brew --prefix libpq)/bin"
        echo "ECHO_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
        echo "TEST_PG_TOOL_PATH=$LIBPQ_BIN" >> "$GITHUB_ENV"
    - name: Bootstrap Postgres ${{ matrix.version }}
      run: |
        chmod +x .github/scripts/bootstrap-db-fixtures.sh
        .github/scripts/bootstrap-db-fixtures.sh postgres
    - name: Run Postgres ${{ matrix.version }} Tests
      run: |
        find . -maxdepth 1 -name "TestResults-pg${{ matrix.version }}*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj -derivedDataPath DerivedData-Echo \
          -scheme Echo -testPlan PostgresCompatibilityTests \
          -destination 'platform=macOS' \
          -resultBundlePath "TestResults-pg${{ matrix.version }}" \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Verify Results
      if: always()
      run: |
        python3 .github/scripts/verify_xcresult.py \
          --path "TestResults-pg${{ matrix.version }}.xcresult" \
          --label "Postgres ${{ matrix.version }}" --min-executed 1
    - name: Upload Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-pg${{ matrix.version }}
        path: "TestResults-*.xcresult"

  # ── Step 6: Production Build & Release ───────────────────────────────────

  release:
    name: "Step 6: Production Build & Release"
    runs-on: macos-26
    needs: [unit-tests, integration-tests, extended-integration, mssql-compatibility, postgres-compatibility]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'
    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo
    - name: Determine version
      id: version
      run: |
        MARKETING_VERSION=$(xcodebuild -project Echo.xcodeproj -scheme Echo -showBuildSettings 2>/dev/null \
          | grep 'MARKETING_VERSION' | head -1 | awk '{print $3}')
        LATEST_TAG=$(git tag --list "v${MARKETING_VERSION}.*" --sort=-version:refname | head -1)
        LATEST_PATCH=$(printf "%s" "$LATEST_TAG" | sed "s/v${MARKETING_VERSION}\.\([0-9]*\)/\1/")
        PATCH=${LATEST_PATCH:+$((LATEST_PATCH + 1))}
        PATCH=${PATCH:-0}
        FULL_VERSION="${MARKETING_VERSION}.${PATCH}"
        echo "full=$FULL_VERSION" >> $GITHUB_OUTPUT
        echo "previous_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT
        echo "patch=$PATCH" >> $GITHUB_OUTPUT
        echo "tag=v$FULL_VERSION" >> $GITHUB_OUTPUT
    - name: Build Release
      run: |
        xcodebuild -project Echo.xcodeproj -scheme Echo -configuration Release -derivedDataPath build \
          MARKETING_VERSION=${{ steps.version.outputs.full }} \
          CURRENT_PROJECT_VERSION=${{ steps.version.outputs.patch }} \
          CODE_SIGN_IDENTITY="-" ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'
    - name: Package
      run: |
        mkdir -p release
        cp -R build/Build/Products/Release/Echo.app release/
        codesign --force --deep -s - release/Echo.app
        cd release && ditto -c -k --sequesterRsrc --keepParent Echo.app Echo.zip
    - name: Sparkle & Appcast
      env:
        SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      run: |
        curl -L https://github.com/sparkle-project/Sparkle/releases/download/2.6.4/Sparkle-2.6.4.tar.xz -o sparkle.tar.xz
        tar -xf sparkle.tar.xz
        if [ -n "$SPARKLE_PRIVATE_KEY" ]; then
          echo "$SPARKLE_PRIVATE_KEY" | ./bin/generate_appcast --ed-key-file - release/
        else
          ./bin/generate_appcast release/
        fi
        mv release/appcast.xml . && mv release/Echo.zip .
    - name: Release Notes
      run: |
        python3 .github/scripts/generate_release_notes.py \
          --repo-key echo --repo-name Echo \
          --new-tag "${{ steps.version.outputs.tag }}" \
          --previous-tag "${{ steps.version.outputs.previous_tag }}" \
          --output release-notes.md
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: Echo ${{ steps.version.outputs.full }}
        files: |
          Echo.zip
          appcast.xml
        body_path: release-notes.md
