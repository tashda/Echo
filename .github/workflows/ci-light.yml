name: "CI (Light)"

on:
  push:
    branches: [ dev ]
  workflow_dispatch:

concurrency:
  group: ci-light-${{ github.ref_name }}
  cancel-in-progress: true

env:
  PG_TOOLS_SCRIPT: |
    brew list libpq >/dev/null 2>&1 || brew install libpq
    brew list krb5 >/dev/null 2>&1 || brew install krb5
    brew list zstd >/dev/null 2>&1 || brew install zstd
    brew list lz4 >/dev/null 2>&1 || brew install lz4
    brew list gettext >/dev/null 2>&1 || brew install gettext
    LIBPQ_PREFIX="$(brew --prefix libpq)"
    mkdir -p Tools/PostgresTools
    cp "$LIBPQ_PREFIX/bin/pg_dump" Tools/PostgresTools/
    cp "$LIBPQ_PREFIX/bin/pg_restore" Tools/PostgresTools/
    SEARCH_DIRS="$LIBPQ_PREFIX/lib $(brew --prefix krb5)/lib $(brew --prefix zstd)/lib $(brew --prefix lz4)/lib $(brew --prefix gettext)/lib $(brew --prefix openssl@3)/lib /opt/homebrew/lib /usr/local/lib"
    for lib in libpq.5.dylib libzstd.1.dylib liblz4.1.dylib libssl.3.dylib libcrypto.3.dylib libintl.8.dylib libgssapi_krb5.2.2.dylib libkrb5.3.3.dylib libk5crypto.3.1.dylib libkrb5support.1.1.dylib libcom_err.3.0.dylib; do
      for dir in $SEARCH_DIRS; do
        if [ -f "$dir/$lib" ]; then cp "$dir/$lib" Tools/PostgresTools/ && break; fi
      done
    done

jobs:
  build-and-test:
    name: "Build & Test"
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '26'

    - name: Install PostgreSQL tools
      run: ${{ env.PG_TOOLS_SCRIPT }}

    - name: Clear SPM cache
      run: |
        rm -rf ~/Library/Caches/org.swift.swiftpm/repositories
        rm -rf ~/Library/Developer/Xcode/DerivedData/*/SourcePackages

    - name: Resolve packages
      run: xcodebuild -resolvePackageDependencies -project Echo.xcodeproj -scheme Echo

    - name: Run Unit Tests
      run: |
        find . -maxdepth 1 -name "TestResults-unit*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan UnitTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-unit \
          -disable-concurrent-testing \
          CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'

    - name: Run SQLite Integration Tests
      run: |
        find . -maxdepth 1 -name "TestResults-sqlite*" -exec rm -rf {} + 2>/dev/null || true
        xcodebuild test -project Echo.xcodeproj \
          -scheme Echo \
          -testPlan SQLiteIntegrationTests \
          -destination 'platform=macOS' \
          -resultBundlePath TestResults-sqlite \
          CODE_SIGN_IDENTITY="-" CODE_SIGNING_ALLOWED=NO ENABLE_HARDENED_RUNTIME=NO OTHER_CODE_SIGN_FLAGS='--deep'

    - name: Upload Unit Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-unit
        path: TestResults-unit.xcresult

    - name: Upload SQLite Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-sqlite
        path: TestResults-sqlite.xcresult
